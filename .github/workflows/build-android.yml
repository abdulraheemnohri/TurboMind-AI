name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: 3.10
    - run: pip install buildozer
    - run: pip install -r requirements.txt
    - uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25b
    - run: sudo apt update && sudo apt install -y openjdk-17-jdk unzip
    - run: |
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip -d android-sdk
        export ANDROID_HOME=$PWD/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
        yes | sdkmanager --sdk_root=$ANDROID_HOME --licenses > /dev/null
        sdkmanager --sdk_root=$ANDROID_HOME platform-tools platforms;android-30 build-tools;30.0.3 > /dev/null
    - run: |
        mkdir -p ~/.buildozer/android/platform
        cp -r android-sdk ~/.buildozer/android/platform/
    - run: buildozer -v android debug
      timeout-minutes: 90
    - uses: actions/upload-artifact@v4
      with:
        name: TurboMind-AI-APK
        path: bin/*.apk
