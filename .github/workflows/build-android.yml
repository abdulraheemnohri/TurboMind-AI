name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.10
          cache: pip
      
      - name: Install Buildozer
        run: pip install buildozer
      
      - name: Install requirements
        run: pip install -r requirements.txt
      
      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25b
          add-to-path: true
      
      - name: Install Android SDK
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jdk unzip
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip cmdline-tools.zip -d android-sdk
          export ANDROID_HOME=$PWD/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          yes | sdkmanager --sdk_root=$ANDROID_HOME --licenses > /dev/null
          sdkmanager --sdk_root=$ANDROID_HOME platform-tools platforms;android-30 build-tools;30.0.3 > /dev/null
      
      - name: Configure Buildozer
        run: |
          mkdir -p ~/.buildozer/android/platform
          cp -r android-sdk ~/.buildozer/android/platform/android-sdk
          echo ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk >> $GITHUB_ENV
          echo ANDROID_NDK_HOME=$HOME/.buildozer/android/platform/android-ndk-r25b >> $GITHUB_ENV
          echo JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64 >> $GITHUB_ENV
      
      - name: Initialize Buildozer
        run: buildozer init
      
      - name: Build Android Debug APK
        run: buildozer -v android debug
        timeout-minutes: 60
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TurboMind-AI-Debug-APK
          path: bin/*.apk
          retention-days: 30
