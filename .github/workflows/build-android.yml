name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - run: pip install buildozer cython
    - run: pip install -r requirements.txt

    # Setup Android NDK
    - uses: nttld/setup-ndk@v1
      with:
        ndk-version: r28c

    - run: |
        sudo apt update
        sudo apt install -y \
          openjdk-17-jdk \
          unzip \
          autoconf \
          autoconf-archive \
          automake \
          libtool \
          libtool-bin \
          pkg-config \
          m4 \
          build-essential \
          libffi-dev \
          zlib1g-dev \
          libbz2-dev \
          libreadline-dev \
          libsqlite3-dev \
          libncurses5-dev \
          libgdbm-dev \
          liblzma-dev \
          tk-dev \
          libssl-dev \
          libxml2-dev \
          libxslt1-dev \
          libjpeg-dev
        
        # Fix libtool macro issues by reconfiguring autoconf macros
        sudo libtoolize --install --force 2>/dev/null || true
        sudo update-alternatives --install /usr/bin/libtoolize libtoolize /usr/bin/libtoolize 1 || true

    - run: |
        set -e
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip
        mkdir -p android-sdk/cmdline-tools/latest
        mv cmdline-tools/* android-sdk/cmdline-tools/latest/ 2>/dev/null || true

        # Create legacy tools/bin location expected by buildozer and other SDK tooling
        mkdir -p android-sdk/tools/bin
        ln -sf "$PWD/android-sdk/cmdline-tools/latest/bin/sdkmanager" "$PWD/android-sdk/tools/bin/sdkmanager"
        chmod +x "$PWD/android-sdk/tools/bin/sdkmanager"

        export ANDROID_HOME=$PWD/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/tools/bin

        yes | sdkmanager --sdk_root=$ANDROID_HOME --licenses > /dev/null
        sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "platforms;android-30" "build-tools;30.0.3"
    - run: |
        export ANDROID_HOME=$PWD/android-sdk
        mkdir -p ~/.buildozer/android/platform
        cp -r $ANDROID_HOME ~/.buildozer/android/platform/
    
    - run: |
        # Set build environment variables for better compatibility
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        export PATH=$JAVA_HOME/bin:$PATH
        buildozer -v android debug
      timeout-minutes: 120
      env:
        PYTHONUNBUFFERED: 1
    
    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: TurboMind-AI-APK
        path: bin/*.apk
    
    - uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-logs
        path: .buildozer/android/platform/build-*/*.log
